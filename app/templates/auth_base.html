<!doctype html>
<html lang="en" data-theme="{{ request.cookies.get('theme', 'dark') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Competitor Watch{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ agent_brand.avatar_url }}">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="/static/style.css?v=m-and-a-1">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="dot"></span>
      <span>Competitor Watch</span>
    </div>
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
